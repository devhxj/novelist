name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'ci-*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Git runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: build/runtime
          key: git-runtime-${{ runner.os }}-${{ hashFiles('scripts/download-git.sh') }}

      - name: Download Git runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/download-git.sh

      - name: Build frontend
        run: npm --prefix frontend ci && npm --prefix frontend run build

      - name: Publish Novelist
        shell: bash
        run: bash scripts/novelist-publish.sh win-x64

      - name: Install Inno Setup
        run: choco install innosetup -y --limit-output

      - name: Package installer
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/Inno Setup 6:$PATH"
          export VERSION="${GITHUB_REF_NAME#v}"
          iscc build/package/windows/setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/dist/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Git runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: build/runtime
          key: git-runtime-${{ runner.os }}-${{ hashFiles('scripts/download-git.sh') }}

      - name: Download Git runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: bash scripts/download-git.sh

      - name: Build frontend
        run: npm --prefix frontend ci && npm --prefix frontend run build

      - name: Publish Novelist
        run: bash scripts/novelist-publish.sh linux-x64

      - name: Package AppImage
        run: bash build/package/linux/build-appimage.sh ${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Git runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: build/runtime
          key: git-runtime-${{ runner.os }}-${{ hashFiles('scripts/download-git.sh') }}

      - name: Download Git runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: bash scripts/download-git.sh

      - name: Build frontend
        run: npm --prefix frontend ci && npm --prefix frontend run build

      - name: Publish Novelist
        run: bash scripts/novelist-publish.sh osx-arm64

      - name: Package DMG
        run: bash build/package/macos/build-dmg.sh ${GITHUB_REF_NAME#v}

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/dist/*

  release:
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir dist
          cp windows/* dist/ 2>/dev/null || true
          cp linux/* dist/ 2>/dev/null || true
          cp macos/* dist/ 2>/dev/null || true
          cd dist && sha256sum *.{exe,AppImage,dmg} > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
